name: Validate GitHub Actions

on:
  pull_request:
    paths:
      - ".github/workflows/*.yml"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate workflows
        uses: actions/validate-workflow@v1
        with:
          workflow-files: ".github/workflows/*.yml"

      - name: Check Node.js versions in actions
        run: |
          echo "Checking for deprecated Node.js actions..."

          # Check for actions using Node.js 16 or 20
          grep -r "actions/.*@v[0-9]" .github/workflows/ | while read -r line; do
            if echo "$line" | grep -q "@v[0-3]"; then
              echo "Warning: $line uses deprecated version"
            fi
          done
