name: Database CI/CD

on:
  push:
    paths:
      - "database/**"
      - ".github/workflows/database-ci.yml"
    branches:
      - main
      - develop
  pull_request:
    paths:
      - "database/**"
    branches:
      - main

env:
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_password
  POSTGRES_DB: test_db
  POSTGRES_PORT: 5432

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }}; then
              echo "PostgreSQL is ready"
              break
            fi
            sleep 1
          done

      - name: Initialize database schema
        run: |
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} -f database/init/01-init.sql
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} -f database/init/02-seed.sql
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} -f database/init/03-indexes.sql

      - name: Verify schema
        run: |
          # Check if all tables exist
          TABLES=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';")
          echo "Created $TABLES tables"

          # Check if roles exist
          ROLES=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM roles;")
          echo "Created $ROLES roles"

          # Check if admin user exists
          ADMIN=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM users WHERE login = 'admin';")
          if [ "$ADMIN" -eq 1 ]; then
            echo "Admin user created successfully"
          else
            echo "Admin user not found"
            exit 1
          fi

      - name: Test constraints
        run: |
          # Test weight validation
          cat > test.sql << 'EOF'
          DO $$
          DECLARE
            hackathon_id UUID;
          BEGIN
            -- Create test hackathon
            INSERT INTO hackathons (title, start_at, end_at) 
            VALUES ('Test', NOW(), NOW() + interval '1 day') 
            RETURNING id INTO hackathon_id;
            
            -- This should fail because sum of weights != 100
            BEGIN
              INSERT INTO criteria (hackathon_id, title, max_score, weight_percent, sort_order)
              VALUES (hackathon_id, 'Test Criterion', 10, 50, 1);
              RAISE EXCEPTION 'Should have failed';
            EXCEPTION
              WHEN OTHERS THEN
                -- Expected error
                NULL;
            END;
          END $$;
          EOF

          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} -f test.sql

      - name: Run performance tests
        run: |
          # Insert test data
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} << 'EOF'
          DO $$
          DECLARE
            hackathon_id UUID;
            team_id UUID;
            user_id UUID;
          BEGIN
            -- Create hackathon
            INSERT INTO hackathons (title, start_at, end_at, status)
            VALUES ('Performance Test', NOW(), NOW() + interval '7 days', 'active')
            RETURNING id INTO hackathon_id;
            
            -- Create 100 teams
            FOR i IN 1..100 LOOP
              INSERT INTO teams (hackathon_id, name, captain_name, project_title)
              VALUES (hackathon_id, 'Team ' || i, 'Captain ' || i, 'Project ' || i);
            END LOOP;
            
            -- Create 10 experts
            FOR i IN 1..10 LOOP
              INSERT INTO users (login, password_hash, full_name, role_id)
              SELECT 'expert_' || i, 'hash', 'Expert ' || i, id FROM roles WHERE code = 'expert';
            END LOOP;
          END $$;
          EOF

          # Test query performance
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} -c "EXPLAIN ANALYZE SELECT * FROM teams WHERE hackathon_id IN (SELECT id FROM hackathons WHERE status = 'active');"

      - name: Run security checks
        run: |
          # Check for weak passwords
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} -c "SELECT rolname FROM pg_roles WHERE rolpassword IS NULL AND rolcanlogin = true;"

          # Check for default passwords
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -p ${{ env.POSTGRES_PORT }} -d ${{ env.POSTGRES_DB }} -c "SELECT usename FROM pg_user WHERE passwd IS NULL;"

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./database
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/hackathon-postgres:latest
            ${{ secrets.DOCKER_USERNAME }}/hackathon-postgres:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to production
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "$DEPLOY_KEY" > deploy_key
          chmod 600 deploy_key

          ssh -o StrictHostKeyChecking=no -i deploy_key $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
            cd /opt/hackathon
            git pull
            cd database
            docker-compose pull
            docker-compose up -d --force-recreate
            ./scripts/healthcheck.sh
          EOF
