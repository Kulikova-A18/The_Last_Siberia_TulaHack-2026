# .github/workflows/database-ci.yml
name: Database CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - "database/**"
      - ".github/workflows/database-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "database/**"
  workflow_dispatch: # Allows manual trigger

env:
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_pass_123
  POSTGRES_DB: test_db

jobs:
  # ============================================================
  # JOB 1: Quick Test - Быстрая проверка на PR/push
  # ============================================================
  quick-test:
    name: 🔍 Quick Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass_123
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          echo "✅ PostgreSQL client installed"

      - name: ⏳ Wait for PostgreSQL
        run: |
          echo "⏳ Waiting for PostgreSQL to be ready..."
          for i in {1..30}; do
            if PGPASSWORD=${{ env.POSTGRES_PASSWORD }} pg_isready -h localhost -U ${{ env.POSTGRES_USER }} -d ${{ env.POSTGRES_DB }} > /dev/null 2>&1; then
              echo "✅ PostgreSQL is ready"
              break
            fi
            echo "   Attempt $i/30..."
            sleep 2
          done

      - name: 📊 Show database version
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 DATABASE INFORMATION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -c "SELECT version();"
          echo ""
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -c "SELECT datname FROM pg_database WHERE datistemplate = false;"

      - name: 🚀 Run initialization scripts
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 RUNNING INITIALIZATION SCRIPTS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          INIT_DIR="database/init"
          SCRIPTS=("01-init.sql" "02-seed.sql" "03-indexes.sql")

          for script in "${SCRIPTS[@]}"; do
            if [ -f "$INIT_DIR/$script" ]; then
              echo ""
              echo "▶️  Running: $script"
              echo "────────────────────────────────────────"
              
              if PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -f "$INIT_DIR/$script" 2>&1; then
                echo "✅ $script completed successfully"
              else
                echo "❌ Failed on $script"
                exit 1
              fi
            fi
          done

      - name: ✅ Quick verification
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ QUICK VERIFICATION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          TABLE_COUNT=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE';")
          echo "📋 Tables: $TABLE_COUNT"

          ADMIN_COUNT=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM users WHERE login = 'admin';")
          if [ "$ADMIN_COUNT" -eq 1 ]; then
            echo "✅ Admin user exists"
          else
            echo "❌ Admin user missing"
            exit 1
          fi

          echo ""
          echo "🎉 Quick test passed!"

  # ============================================================
  # JOB 2: Full Test - Полное тестирование (зависит от quick-test)
  # ============================================================
  full-test:
    name: 🧪 Full Test Suite
    runs-on: ubuntu-latest
    needs: quick-test
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass_123
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client jq
          echo "✅ Dependencies installed"

      - name: ⏳ Wait for PostgreSQL
        run: |
          echo "⏳ Waiting for PostgreSQL..."
          for i in {1..30}; do
            if PGPASSWORD=${{ env.POSTGRES_PASSWORD }} pg_isready -h localhost -U ${{ env.POSTGRES_USER }} > /dev/null 2>&1; then
              echo "✅ PostgreSQL ready"
              break
            fi
            sleep 2
          done

      - name: 🚀 Run all initialization scripts
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🚀 FULL INITIALIZATION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          for file in database/init/*.sql; do
            echo ""
            echo "📄 Processing: $(basename $file)"
            echo "────────────────────────────────────────"
            PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -f "$file"
            if [ $? -eq 0 ]; then
              echo "✅ $(basename $file) OK"
            else
              echo "❌ Failed on $(basename $file)"
              exit 1
            fi
          done

      - name: 📊 Database object statistics
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 DATABASE OBJECT STATISTICS"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          cat > /tmp/stats.sql << 'EOF'
          SELECT 'Tables' as object_type, COUNT(*) as count FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE'
          UNION ALL
          SELECT 'Views', COUNT(*) FROM information_schema.views WHERE table_schema = 'public'
          UNION ALL
          SELECT 'Functions', COUNT(*) FROM pg_proc WHERE pronamespace = 'public'::regnamespace
          UNION ALL
          SELECT 'Triggers', COUNT(*) FROM information_schema.triggers
          UNION ALL
          SELECT 'Indexes', COUNT(*) FROM pg_indexes WHERE schemaname = 'public'
          UNION ALL
          SELECT 'Enum Types', COUNT(*) FROM pg_type WHERE typtype = 'e'
          UNION ALL
          SELECT 'Sequences', COUNT(*) FROM information_schema.sequences WHERE sequence_schema = 'public';
          EOF

          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -f /tmp/stats.sql

      - name: 👥 Role and permission validation
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "👥 ROLE & PERMISSION VALIDATION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # List all roles
          echo "📌 Roles in system:"
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "SELECT code, name FROM roles ORDER BY code;" | while read line; do
            echo "   • $line"
          done

          # Permission counts per role
          echo ""
          echo "📌 Permission counts:"
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -c "
            SELECT r.code, COUNT(rp.permission_id) as perm_count 
            FROM roles r
            LEFT JOIN role_permissions rp ON r.id = rp.role_id
            GROUP BY r.code
            ORDER BY perm_count DESC;
          "

      - name: 🔐 User authentication test
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔐 USER AUTHENTICATION TEST"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Test admin login
          ADMIN_EXISTS=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM users WHERE login = 'admin' AND is_active = true;")
          if [ "$ADMIN_EXISTS" -eq 1 ]; then
            echo "✅ Admin user exists and is active"
          else
            echo "❌ Admin user not found or inactive"
            exit 1
          fi

          # Get admin role
          ADMIN_ROLE=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "SELECT r.code FROM users u JOIN roles r ON u.role_id = r.id WHERE u.login = 'admin';" | tr -d ' ')
          echo "   Admin role: $ADMIN_ROLE"

      - name: 🔗 Foreign key integrity test
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔗 FOREIGN KEY INTEGRITY TEST"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          cat > /tmp/fk_test.sql << 'EOF'
          DO $$
          DECLARE
              fk_record RECORD;
              orphan_count INTEGER;
          BEGIN
              FOR fk_record IN
                  SELECT
                      tc.constraint_name,
                      tc.table_name,
                      kcu.column_name,
                      ccu.table_name AS foreign_table_name,
                      ccu.column_name AS foreign_column_name
                  FROM information_schema.table_constraints tc
                  JOIN information_schema.key_column_usage kcu
                      ON tc.constraint_name = kcu.constraint_name
                  JOIN information_schema.constraint_column_usage ccu
                      ON ccu.constraint_name = tc.constraint_name
                  WHERE tc.constraint_type = 'FOREIGN KEY'
                    AND tc.table_schema = 'public'
              LOOP
                  EXECUTE format('
                      SELECT COUNT(*) FROM %I t
                      WHERE NOT EXISTS (
                          SELECT 1 FROM %I ft
                          WHERE ft.%I = t.%I
                      )
                  ', fk_record.table_name, fk_record.foreign_table_name, 
                     fk_record.foreign_column_name, fk_record.column_name)
                  INTO orphan_count;
                  
                  IF orphan_count > 0 THEN
                      RAISE NOTICE '⚠️  Orphaned rows in %: %', fk_record.table_name, orphan_count;
                  END IF;
              END LOOP;
              
              RAISE NOTICE '✅ Foreign key integrity check completed';
          END $$;
          EOF

          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -f /tmp/fk_test.sql

      - name: 📈 Performance baseline test
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📈 PERFORMANCE BASELINE TEST"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          cat > /tmp/perf_test.sql << 'EOF'
          -- Check index usage
          SELECT
              schemaname,
              tablename,
              indexname,
              idx_scan as scans,
              idx_tup_read as tuples_read,
              idx_tup_fetch as tuples_fetched
          FROM pg_stat_user_indexes
          ORDER BY idx_scan DESC
          LIMIT 10;
          EOF

          echo "📌 Top 10 indexes by usage:"
          PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -f /tmp/perf_test.sql

          # Check cache hit ratio
          CACHE_HIT=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "
            SELECT round(100 * sum(heap_blks_hit) / nullif(sum(heap_blks_hit) + sum(heap_blks_read), 0), 2)
            FROM pg_statio_user_tables;
          " | tr -d ' ')
          echo "💾 Cache hit ratio: ${CACHE_HIT}%"

      - name: ✅ Full test summary
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ FULL TEST SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Final verification counts
          TOTAL_TABLES=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE';" | tr -d ' ')
          TOTAL_VIEWS=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM information_schema.views WHERE table_schema = 'public';" | tr -d ' ')
          TOTAL_FUNCTIONS=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM pg_proc WHERE pronamespace = 'public'::regnamespace;" | tr -d ' ')
          TOTAL_TRIGGERS=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM information_schema.triggers;" | tr -d ' ')
          TOTAL_INDEXES=$(PGPASSWORD=${{ env.POSTGRES_PASSWORD }} psql -U ${{ env.POSTGRES_USER }} -h localhost -d ${{ env.POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM pg_indexes WHERE schemaname = 'public';" | tr -d ' ')

          echo "📊 Final Database Statistics:"
          echo "   🗃️  Tables: $TOTAL_TABLES"
          echo "   👁️  Views: $TOTAL_VIEWS"
          echo "   ⚙️  Functions: $TOTAL_FUNCTIONS"
          echo "   🔔 Triggers: $TOTAL_TRIGGERS"
          echo "   📇 Indexes: $TOTAL_INDEXES"
          echo ""
          echo "🎉 All tests passed successfully!"

  # ============================================================
  # JOB 3: Docker Build - Сборка Docker образа
  # ============================================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: full-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 📦 Build Docker image
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🐳 BUILDING DOCKER IMAGE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          IMAGE_NAME="hackathon-postgres"
          IMAGE_TAG="${GITHUB_SHA::8}"

          echo "📌 Image: $IMAGE_NAME:$IMAGE_TAG"
          echo "📌 Branch: ${GITHUB_REF_NAME}"
          echo ""

          cd database

          # Build image
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .

          if [ $? -eq 0 ]; then
            echo ""
            echo "✅ Docker image built successfully"
            
            # Show image info
            echo ""
            echo "📊 Image information:"
            docker images | grep $IMAGE_NAME
          else
            echo "❌ Docker build failed"
            exit 1
          fi

      - name: 🔍 Test Docker image
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 TESTING DOCKER IMAGE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          IMAGE_NAME="hackathon-postgres"
          IMAGE_TAG="${GITHUB_SHA::8}"
          CONTAINER_NAME="test-postgres-container"

          # Run container
          docker run -d \
            --name $CONTAINER_NAME \
            -e POSTGRES_USER=test_user \
            -e POSTGRES_PASSWORD=test_pass \
            -e POSTGRES_DB=test_db \
            -p 5433:5432 \
            $IMAGE_NAME:$IMAGE_TAG

          # Wait for startup
          echo "⏳ Waiting for container to start..."
          sleep 10

          # Test connection
          for i in {1..30}; do
            if docker exec $CONTAINER_NAME pg_isready -U test_user > /dev/null 2>&1; then
              echo "✅ Container is ready"
              break
            fi
            sleep 2
          done

          # Verify tables
          TABLE_COUNT=$(docker exec $CONTAINER_NAME psql -U test_user -d test_db -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE';" | tr -d ' ')
          echo "📋 Tables in container: $TABLE_COUNT"

          # Cleanup
          docker stop $CONTAINER_NAME
          docker rm $CONTAINER_NAME

          echo "✅ Docker image test passed"

  # ============================================================
  # JOB 4: Deploy - Развертывание (только на main)
  # ============================================================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📦 Copy files to server
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 COPYING FILES TO SERVER"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'backups' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./database/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/hackathon/database/

      - name: 🐳 Deploy with Docker Compose
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🐳 DEPLOYING WITH DOCKER COMPOSE"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /opt/hackathon/database
            
            # Create .env file
            cat > .env << ENV
            POSTGRES_USER=${{ secrets.PROD_POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.PROD_POSTGRES_DB }}
            POSTGRES_PORT=5432
            PGADMIN_EMAIL=${{ secrets.PROD_PGADMIN_EMAIL }}
            PGADMIN_PASSWORD=${{ secrets.PROD_PGADMIN_PASSWORD }}
            PGADMIN_PORT=5050
            ENV
            
            # Pull latest images
            docker-compose pull
            
            # Stop existing containers
            docker-compose down
            
            # Backup database before upgrade
            mkdir -p backups
            docker run --rm \
              --network database_default \
              -e PGPASSWORD=${{ secrets.PROD_POSTGRES_PASSWORD }} \
              postgres:15-alpine \
              pg_dump -h postgres -U ${{ secrets.PROD_POSTGRES_USER }} -d ${{ secrets.PROD_POSTGRES_DB }} \
              > backups/pre_deploy_$(date +%Y%m%d_%H%M%S).sql 2>/dev/null || true
            
            # Start new containers
            docker-compose up -d
            
            # Wait for healthy
            sleep 10
            
            # Check health
            if docker-compose ps | grep -q "healthy"; then
              echo "✅ Containers are healthy"
            else
              echo "⚠️  Health check may still be running"
            fi
            
            # Clean old images
            docker image prune -f
          EOF

          echo "✅ Deployment completed"

      - name: 🔍 Verify deployment
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🔍 VERIFYING DEPLOYMENT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /opt/hackathon/database
            
            echo "📊 Container status:"
            docker-compose ps
            
            echo ""
            echo "📊 Database health check:"
            docker exec hackathon_postgres pg_isready -U ${{ secrets.PROD_POSTGRES_USER }}
            
            echo ""
            echo "📊 Table count:"
            docker exec hackathon_postgres psql -U ${{ secrets.PROD_POSTGRES_USER }} -d ${{ secrets.PROD_POSTGRES_DB }} -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public';"
          EOF

          echo ""
          echo "🎉 Production deployment verified!"

      - name: 📢 Send deployment notification
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📢 DEPLOYMENT NOTIFICATION"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          # Send to GitHub summary
          cat >> $GITHUB_STEP_SUMMARY << SUMMARY
          ## 🚀 Deployment Complete

          | Service | Status |
          |---------|--------|
          | **Environment** | Production |
          | **Branch** | ${{ github.ref_name }} |
          | **Commit** | ${{ github.sha }} |
          | **Deployed by** | ${{ github.actor }} |

          ### Connection Information
          - **Host**: ${{ secrets.DEPLOY_HOST }}
          - **PostgreSQL Port**: 5432
          - **pgAdmin Port**: 5050

          ✅ Deployment successful!
          SUMMARY

          echo "✅ Deployment notification sent to GitHub Summary"

  # ============================================================
  # JOB 5: Final Report - Итоговый отчет
  # ============================================================
  final-report:
    name: 📋 Final Report
    runs-on: ubuntu-latest
    needs: [quick-test, full-test, docker-build, deploy]
    if: always()

    steps:
      - name: 📊 Generate final report
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📋 FINAL CI/CD REPORT"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📊 Database CI/CD Pipeline Report

          | Job | Status | Description |
          |-----|--------|-------------|
          EOF

          # Add job statuses
          echo "| 🔍 Quick Test | ${{ needs.quick-test.result }} | Basic schema validation |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Full Test Suite | ${{ needs.full-test.result }} | Complete database testing |" >> $GITHUB_STEP_SUMMARY
          echo "| 🐳 Docker Build | ${{ needs.docker-build.result }} | Container image build |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 Deploy | ${{ needs.deploy.result }} | Production deployment |" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Pipeline Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Run ID**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

          echo ""
          echo "✅ Final report generated"
