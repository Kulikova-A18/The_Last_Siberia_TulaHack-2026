name: Quick Database Test

on:
  push:
    paths:
      - "database/init/*.sql"
  pull_request:
    paths:
      - "database/init/*.sql"

jobs:
  quick-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - name: Test database initialization
        run: |
          # Run all init scripts
          for file in database/init/*.sql; do
            echo "Running $file"
            PGPASSWORD=test psql -U test -h localhost -d test -f "$file"
            if [ $? -ne 0 ]; then
              echo "Failed on $file"
              exit 1
            fi
          done

          # Verify tables were created
          TABLE_COUNT=$(PGPASSWORD=test psql -U test -h localhost -d test -t -c "SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = 'public' AND table_type = 'BASE TABLE';")
          echo "✓ Created $TABLE_COUNT tables"

          # Verify admin user
          ADMIN_COUNT=$(PGPASSWORD=test psql -U test -h localhost -d test -t -c "SELECT COUNT(*) FROM users WHERE login = 'admin';")
          if [ "$ADMIN_COUNT" -eq 1 ]; then
            echo "✓ Admin user created"
          else
            echo "✗ Admin user not found"
            exit 1
          fi

          echo "✅ All tests passed!"
