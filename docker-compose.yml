# docker-compose.yml (в корне проекта)
version: "3.8"

services:
  postgres:
    extends:
      file: database/docker-compose.yml
      service: postgres

  pgadmin:
    extends:
      file: database/docker-compose.yml
      service: pgadmin

  backend:
    extends:
      file: backend/docker-compose.yml
      service: backend
    depends_on:
      postgres:
        condition: service_healthy

networks:
  hackathon_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
