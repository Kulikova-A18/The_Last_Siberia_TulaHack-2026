name: hackrank_frontend
description: A frontend for HackRank hackathon evaluation system.

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: ^13.2.0

  # State management
  riverpod: ^2.5.0
  flutter_riverpod: ^2.5.0

  # Networking
  dio: ^5.4.0
  web_socket_channel: ^2.4.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^6.2.0
  data_table_2: ^2.5.0
  fl_chart: ^0.67.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.3.0

  # YAML parsing
  yaml: ^3.1.2

  # JWT decoding
  jwt_decode: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/config.yaml
    - assets/images/
